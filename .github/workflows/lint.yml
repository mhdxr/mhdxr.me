# https://github.com/kentcdodds/kentcdodds.com/blob/main/.github/workflows/deployment.yml
name: Code Check
on:
  push:
    branches:
      - master
      - main
  pull_request: {}

concurrency:
  group: ${{ github.job }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: ⬣ ESLint
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v4

      - name: ⎔ Setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 📥 Download deps
        uses: bahmutov/npm-install@v1

      - name: 🔬 Lint
        run: yarn lint

  typecheck:
    name: ʦ TypeScript
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v4

      - name: ⎔ Setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 📥 Download deps
        uses: bahmutov/npm-install@v1

      - name: 🔎 Type check
        run: yarn typecheck

  prettier:
    name: 💅 Prettier
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v4

      - name: ⎔ Setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 📥 Download deps
        uses: bahmutov/npm-install@v1

      - name: 💅 Prettier check
        run: yarn format:check

  test:
    name: 🃏 Test
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v4

      - name: ⎔ Setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 📥 Download deps
        uses: bahmutov/npm-install@v1

      - name: 🃏 Run jest
        run: yarn test

  build:
    name: 🏗️ Build
    runs-on: ubuntu-latest
    # The build job is currently non-blocking. Vercel is the source of truth
    # for deployable builds because it owns the real environment variables.
    #
    # To make this job blocking on GitHub Actions:
    #   1. Add the secrets listed under `env:` below in
    #      Settings → Secrets and variables → Actions.
    #      Minimum required:
    #        - DATABASE_URL
    #        - DIRECT_URL
    #        - NEXTAUTH_URL
    #        - NEXTAUTH_SECRET
    #        - SITE_URL
    #        - NEXT_PUBLIC_FIREBASE_API_KEY
    #        - NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    #        - NEXT_PUBLIC_FIREBASE_DB_URL
    #        - NEXT_PUBLIC_FIREBASE_PROJECT_ID
    #        - NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    #        - NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    #        - NEXT_PUBLIC_FIREBASE_APP_ID
    #        - NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID
    #        - NEXT_PUBLIC_FIREBASE_CHAT_DB
    #   2. Remove `continue-on-error: true` below.
    #
    # The placeholder DATABASE_URL/DIRECT_URL/NEXTAUTH_* values keep the
    # build from crashing on env validation when secrets aren't configured,
    # but Prisma queries run at build time (e.g. `/projects`, `/dashboard`)
    # will still fail without a real database — that's why the job stays
    # non-blocking until real secrets are wired up.
    continue-on-error: true
    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v4

      - name: ⎔ Setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 📥 Download deps
        uses: bahmutov/npm-install@v1

      - name: 🏗️ Run build
        env:
          # Prefer real secrets when available; fall back to inert
          # placeholders so the build can at least compile and type-check
          # the way Vercel does. Empty `${{ secrets.* }}` references
          # evaluate to an empty string, hence the `||` fallback pattern.
          DATABASE_URL: ${{ secrets.DATABASE_URL || 'postgres://user:pass@localhost:5432/db' }}
          DIRECT_URL: ${{ secrets.DIRECT_URL || 'postgres://user:pass@localhost:5432/db' }}
          NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL || 'http://localhost:3000' }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET || 'build-time-placeholder-secret' }}
          SITE_URL: ${{ secrets.SITE_URL || 'https://mhdxr.me' }}
          # Firebase — all NEXT_PUBLIC_* are inlined into the client bundle
          # at build time. Empty values are tolerated by `isFirebaseConfigured`
          # so the guestbook simply renders its "not configured" fallback.
          NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          NEXT_PUBLIC_FIREBASE_DB_URL: ${{ secrets.NEXT_PUBLIC_FIREBASE_DB_URL }}
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
          NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}
          NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID }}
          NEXT_PUBLIC_FIREBASE_CHAT_DB: ${{ secrets.NEXT_PUBLIC_FIREBASE_CHAT_DB }}
        run: yarn build
